; ============================================================
; ESP32 Health Monitor — main-node (GOOUUU ESP32-S3-CAM)
; ============================================================

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_FREERTOS_UNICORE=0

lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0

; ============================================================
; native — runs on the CI/host machine, no ESP32 hardware needed.
; Only builds and tests code with no Arduino/hardware dependency,
; i.e. lib/health_rules.
; ============================================================
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -Iinclude
