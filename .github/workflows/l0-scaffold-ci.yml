name: Layer 0 - Scaffold CI

on:
  push:
    branches: [main]
    paths:
      - 'l0-scaffold/**'
      - '.github/workflows/l0-scaffold-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'l0-scaffold/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (esp32-s3)
        working-directory: l0-scaffold
        run: pio run -e esp32-s3
